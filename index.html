<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>StudyLock</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #000; --surface: #111; --border: #2a2a2a;
      --text: #fff; --sub: #666; --accent: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; background: #000; font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; color: var(--text); overflow: hidden; }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* ── 로그인 화면 ── */
    #login-screen {
      position: absolute; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px;
      transition: opacity 0.4s ease;
    }
    #login-screen.hide { opacity: 0; pointer-events: none; }
    .login-logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; }
    .login-tagline { font-size: 0.9rem; color: var(--sub); margin-bottom: 64px; }
    .login-google-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .login-google-wrap .g_id_signin { border-radius: 8px; overflow: hidden; }
    .login-hint { font-size: 0.75rem; color: #444; text-align: center; }

    /* ── 상단 상태바 ── */
    .status-bar {
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px 10px;
      font-size: 13px; font-weight: 600;
    }
    .status-right { display: flex; align-items: center; gap: 10px; }
    #user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #222; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; overflow: hidden;
    }
    #user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    /* ── 스크롤 영역 ── */
    .scroll-area {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 20px 100px;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── 탭 패널 ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── 하단 네비 ── */
    .nav-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: space-around;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px 0 max(20px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 100;
    }
    .nav-item {
      background: none; border: none; color: var(--sub);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; font-size: 0.68rem; padding: 0 16px;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--text); }
    .nav-icon { font-size: 1.2rem; line-height: 1; }

    /* ── 공통 ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-white { background: var(--text); color: var(--bg); }
    .btn-ghost { background: transparent; border: 1px solid #2a2a2a; color: #555; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* ── 홈 ── */
    .greeting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .greeting-name { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
    .greeting-sub { font-size: 0.82rem; color: var(--sub); margin-top: 4px; }
    .study-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .study-label { font-size: 0.75rem; color: var(--sub); margin-bottom: 4px; }
    .study-time { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .study-goal { font-size: 0.75rem; color: #555; margin-top: 6px; }
    .points-pill { background: #1a1a1a; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
    .progress-bg { width: 100%; height: 5px; background: #1c1c1c; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; }
    .stat-label { font-size: 0.72rem; color: var(--sub); margin-bottom: 6px; }
    .stat-value { font-size: 1.1rem; font-weight: 700; }
    .limits-list { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .limit-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .limit-item:last-child { border-bottom: none; }
    .limit-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .limit-remain { font-size: 0.75rem; color: var(--sub); }
    .limit-bar-bg { width: 44px; height: 3px; background: #222; border-radius: 2px; }
    .limit-bar-fill { height: 100%; background: var(--text); border-radius: 2px; }
    .group-card { display: flex; align-items: center; justify-content: space-between; }
    .group-name-txt { font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
    .group-sub { font-size: 0.78rem; color: var(--sub); }

    /* ── 타이머 오버레이 ── */
    #timer-overlay {
      position: absolute; inset: 0; z-index: 9000;
      background: var(--bg);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    .overlay-label { font-size: 0.75rem; color: var(--sub); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
    .overlay-time { font-size: 5rem; font-weight: 200; letter-spacing: -3px; margin-bottom: 48px; font-variant-numeric: tabular-nums; }
    .participant-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 40px; }
    .p-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 6px; text-align: center; }
    .p-card.active { border-color: #fff; background: #0d0d0d; }
    .p-avatar { font-size: 1.3rem; margin-bottom: 6px; }
    .p-name { font-size: 0.68rem; color: #666; }

    /* ── 통계 ── */
    .big-stat { text-align: center; padding: 28px 0; }
    .big-num { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; }
    .big-sub { font-size: 0.85rem; color: var(--sub); margin-top: 6px; }
  </style>
</head>
<body>
<div id="app">

  <!-- 로그인 화면 -->
  <div id="login-screen">
    <div class="login-logo">StudyLock</div>
    <div class="login-tagline">집중이 습관이 되는 순간</div>
    <div class="login-google-wrap">
      <div id="g_id_onload"
        data-client_id="873434718410-v9k4a2ug741j8ka6sc5mnqjmobb7a2f0.apps.googleusercontent.com"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard" data-size="large" data-theme="outline"
        data-text="signin_with" data-shape="rectangular"
        data-logo_alignment="left" data-width="280">
      </div>
      <p class="login-hint">Google 계정으로 간편하게 시작하세요</p>
    </div>
  </div>

  <!-- 타이머 오버레이 -->
  <div id="timer-overlay">
    <div class="overlay-label">Focus Mode</div>
    <div id="session-elapsed" class="overlay-time">00:00</div>
    <div id="participant-grid" class="participant-grid"></div>
    <button class="btn btn-outline" style="max-width:200px;" id="overlay-stop-btn">집중 종료</button>
  </div>

  <!-- 상단 상태바 -->
  <div class="status-bar">
    <span id="clock">00:00</span>
    <div class="status-right">
      <span style="font-size:0.8rem;color:var(--sub);">StudyLock</span>
      <div id="user-avatar">?</div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="scroll-area">

    <!-- 홈 -->
    <div id="home-panel" class="tab-panel active">
      <div class="greeting-row">
        <div>
          <div class="greeting-name" id="greeting-name-display">안녕하세요</div>
          <div class="greeting-sub">오직 공부에만 집중할 시간입니다.</div>
        </div>
      </div>

      <div class="card">
        <div class="study-top">
          <div>
            <div class="study-label">오늘의 기록</div>
            <div id="study-time-display" class="study-time">0분</div>
            <div id="study-goal-label" class="study-goal">목표 2시간 · 달성 중</div>
          </div>
          <div class="points-pill"><span id="points-display">0</span> pt</div>
        </div>
        <div class="progress-bg"><div id="study-progress-fill" class="progress-fill" style="width:0%"></div></div>
        <button id="study-btn" class="btn btn-white">시작</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">남은 앱 시간</div>
          <div id="remain-app-time" class="stat-value">60분</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">그룹 순위</div>
          <div id="my-rank" class="stat-value">—</div>
        </div>
      </div>

      <div class="section-title">앱 제한 상태</div>
      <div class="limits-list">
        <div class="limit-item">
          <span>📱 인스타그램</span>
          <div class="limit-bar-wrap">
            <span class="limit-remain">잠김</span>
            <div class="limit-bar-bg"><div class="limit-bar-fill" style="width:100%"></div></div>
          </div>
        </div>
        <div class="limit-item">
          <span>▶ 유튜브</span>
          <div class="limit-bar-wrap">
            <span class="limit-remain">잠김</span>
            <div class="limit-bar-bg"><div class="limit-bar-fill" style="width:100%"></div></div>
          </div>
        </div>
      </div>

      <div class="section-title">스터디 그룹</div>
      <div class="card group-card">
        <div>
          <div class="group-name-txt" id="group-name">매칭 대기 중</div>
          <div class="group-sub" id="group-controller">그룹원 3명이 모이면 시작됩니다</div>
        </div>
        <div id="group-avatars" style="font-size:1.4rem;">👥</div>
      </div>
    </div>

    <!-- 통계 -->
    <div id="stats-panel" class="tab-panel">
      <div class="section-title" style="font-size:1.3rem;margin-bottom:20px;">기록</div>
      <div class="card big-stat">
        <div class="big-num" id="total-study-min">0</div>
        <div class="big-sub">오늘 공부한 분</div>
      </div>
      <div class="stats-row">
        <div class="stat-card" style="text-align:center;">
          <div class="stat-label">연속 달성</div>
          <div id="streak-big" class="stat-value">1일</div>
        </div>
        <div class="stat-card" style="text-align:center;">
          <div class="stat-label">획득 포인트</div>
          <div id="total-points-stat" class="stat-value">0 pt</div>
        </div>
      </div>
    </div>

    <!-- 랭킹 -->
    <div id="rank-panel" class="tab-panel">
      <div class="section-title" style="font-size:1.3rem;margin-bottom:20px;">실시간 랭킹</div>
      <div id="leaderboard-list">
        <div style="text-align:center;color:var(--sub);font-size:0.88rem;padding:48px 0;line-height:2.2;">
          👥<br>그룹 매칭이 완료되면<br>랭킹이 표시됩니다
        </div>
      </div>
    </div>

    <!-- 설정 -->
    <div id="settings-panel" class="tab-panel">
      <div class="section-title" style="font-size:1.3rem;margin-bottom:20px;">설정</div>
      <div class="card group-card" style="margin-bottom:20px;">
        <div id="settings-avatar" style="width:48px;height:48px;border-radius:50%;background:#1a1a1a;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0;">?</div>
        <div style="flex:1;margin-left:14px;">
          <div id="settings-name" style="font-weight:700;font-size:1rem;margin-bottom:3px;">—</div>
          <div id="settings-email" style="font-size:0.78rem;color:var(--sub);">—</div>
        </div>
      </div>
      <button id="reset-btn" class="btn btn-ghost" style="margin-bottom:10px;">데이터 초기화</button>
      <button id="logout-btn" class="btn btn-ghost">로그아웃</button>
    </div>

  </div>

  <!-- 하단 네비 -->
  <nav class="nav-bar">
    <button class="nav-item active" data-tab="home"><span class="nav-icon">⌂</span><span>홈</span></button>
    <button class="nav-item" data-tab="stats"><span class="nav-icon">≡</span><span>통계</span></button>
    <button class="nav-item" data-tab="rank"><span class="nav-icon">★</span><span>랭킹</span></button>
    <button class="nav-item" data-tab="settings"><span class="nav-icon">⚙</span><span>설정</span></button>
  </nav>

</div>
<script>
const socket = (typeof io !== 'undefined') ? io() : { emit:()=>{}, on:()=>{} };

const App = {
  state: {
    userName:'', email:'', picture:'', googleId:'',
    myId:null, groupId:null, groupData:null,
    totalStudySec:0, points:0, sessionSec:0, timerInterval:null
  },

  init() {
    this.startClock();
    this.bindEvents();
    const auth = this._loadAuth();
    if (auth) {
      const prog = this._loadProgress();
      this.state.totalStudySec = prog.totalStudySec;
      this.state.points = prog.points;
      this._enterApp(auth);
    }
  },

  _loadAuth() {
    try {
      const d = JSON.parse(localStorage.getItem('studylock_auth') || 'null');
      return (d && (d.googleId || d.name)) ? d : null;
    } catch { return null; }
  },

  _loadProgress() {
    try { return JSON.parse(localStorage.getItem('studylock_progress') || '{}'); }
    catch { return {}; }
  },

  _enterApp(user) {
    this.state.userName = user.name || user.userName || '사용자';
    this.state.email    = user.email   || '';
    this.state.picture  = user.picture || '';
    this.state.googleId = user.googleId || '';

    const ls = document.getElementById('login-screen');
    ls.classList.add('hide');
    setTimeout(() => ls.style.display = 'none', 420);

    const name = this.state.userName;
    document.getElementById('greeting-name-display').textContent = `안녕, ${name}`;

    const av  = document.getElementById('user-avatar');
    const sav = document.getElementById('settings-avatar');
    if (this.state.picture) {
      av.innerHTML  = `<img src="${this.state.picture}" alt="${name}">`;
      sav.innerHTML = `<img src="${this.state.picture}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    } else {
      av.textContent  = name[0];
      sav.textContent = name[0];
    }
    document.getElementById('settings-name').textContent  = name;
    document.getElementById('settings-email').textContent = this.state.email || '—';

    this.updateDashboard();
    socket.emit('joinMatch', { name });
  },

  bindEvents() {
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
        btn.classList.add('active');
      };
    });

    document.getElementById('study-btn').onclick       = () => this.startStudy();
    document.getElementById('overlay-stop-btn').onclick = () => this.stopStudy();

    document.getElementById('reset-btn').onclick = () => {
      localStorage.removeItem('studylock_progress');
      this.state.totalStudySec = 0; this.state.points = 0;
      this.updateDashboard();
    };

    document.getElementById('logout-btn').onclick = () => {
      localStorage.removeItem('studylock_auth');
      localStorage.removeItem('studylock_progress');
      if (window.google?.accounts?.id) google.accounts.id.disableAutoSelect();
      location.reload();
    };

    socket.on('matchComplete', (data) => {
      this.state.groupId = data.groupId; this.state.groupData = data.groupData; this.state.myId = data.myId;
      this.renderGroupInfo();
    });
    socket.on('groupUpdate', (data) => { this.state.groupData = data; this.renderGroupInfo(); });
  },

  renderGroupInfo() {
    const { groupData, myId } = this.state;
    if (!groupData) return;
    document.getElementById('group-name').textContent = groupData.name;
    const admin = groupData.members.find(m => m.id === groupData.adminId);
    document.getElementById('group-controller').textContent = `관리자: ${admin?.id === myId ? '본인' : admin?.name}`;
    const sorted = [...groupData.members].sort((a,b) => b.studySec - a.studySec);
    document.getElementById('my-rank').textContent = `#${sorted.findIndex(m=>m.id===myId)+1}위`;
    document.getElementById('leaderboard-list').innerHTML = sorted.map((m,i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--surface);border:1px solid ${m.id===myId?'#fff':'#222'};border-radius:12px;margin-bottom:8px;">
        <span style="font-weight:${m.id===myId?700:400};color:${m.id===myId?'#fff':'#aaa'}">${i+1}. ${m.name}${m.id===myId?' (나)':''}</span>
        <span style="font-size:0.82rem;color:${m.status==='studying'?'#fff':'#444'}">${m.status==='studying'?'● 집중 중':Math.floor(m.studySec/60)+'분'}</span>
      </div>`).join('');
  },

  startStudy() {
    document.getElementById('timer-overlay').style.display = 'flex';
    this.state.sessionSec = 0;
    const grid = document.getElementById('participant-grid');
    if (this.state.groupId) {
      socket.emit('startStudy', this.state.groupId);
      grid.innerHTML = this.state.groupData.members.map(m => `
        <div class="p-card ${m.id===this.state.myId?'active':''}">
          <div class="p-avatar">👤</div><div class="p-name">${m.name}</div>
        </div>`).join('');
    } else {
      grid.innerHTML = `
        <div class="p-card active" style="grid-column:1/-1;max-width:130px;margin:0 auto;">
          <div class="p-avatar">👤</div>
          <div class="p-name">${this.state.userName}</div>
          <div style="font-size:0.65rem;color:#444;margin-top:4px;">솔로 집중</div>
        </div>`;
    }
    this.state.timerInterval = setInterval(() => {
      this.state.sessionSec++; this.state.totalStudySec++;
      const m = Math.floor(this.state.sessionSec/60), s = this.state.sessionSec%60;
      document.getElementById('session-elapsed').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  },

  stopStudy() {
    clearInterval(this.state.timerInterval);
    document.getElementById('timer-overlay').style.display = 'none';
    this.state.points += Math.floor(this.state.sessionSec/60) * 10;
    socket.emit('stopStudy', { groupId:this.state.groupId, sessionSec:this.state.sessionSec });
    this.saveProgress(); this.updateDashboard();
  },

  updateDashboard() {
    const min = Math.floor(this.state.totalStudySec/60);
    document.getElementById('study-time-display').textContent   = `${min}분`;
    document.getElementById('total-study-min').textContent      = min;
    document.getElementById('points-display').textContent       = this.state.points;
    document.getElementById('total-points-stat').textContent    = this.state.points + ' pt';
    document.getElementById('study-progress-fill').style.width  = Math.min((min/120)*100,100) + '%';
  },

  saveProgress() {
    localStorage.setItem('studylock_progress', JSON.stringify({
      totalStudySec: this.state.totalStudySec, points: this.state.points
    }));
  },

  startClock() {
    const tick = () => {
      const n = new Date();
      document.getElementById('clock').textContent =
        String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    };
    tick(); setInterval(tick, 1000);
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());

function handleGoogleLogin(response) {
  if (!response?.credential) return;
  try {
    const b64  = response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const data = JSON.parse(decodeURIComponent(
      atob(b64).split('').map(c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('')
    ));
    const user = { name:data.name||data.given_name||'사용자', email:data.email||'', picture:data.picture||'', googleId:data.sub||'' };
    localStorage.setItem('studylock_auth', JSON.stringify(user));
    App._enterApp(user);
  } catch(e) { console.error('Google 로그인 오류:', e); }
}
</script>
